<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — NTC Auto Parts</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      max-width: 380px;
      width: 100%;
      box-shadow: var(--shadow-md);
    }
    .login-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .login-brand-icon { font-size: 32px; }
    .login-brand h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; color: var(--text-strong); }
    .login-brand p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .login-field { margin-bottom: 16px; }
    .login-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .login-field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .login-field input:focus { outline: none; border-color: var(--accent); }
    .login-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      margin-top: 8px;
    }
    .login-error {
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid rgba(229,83,75,0.35);
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 14px;
    }
    .login-hint { font-size: 11px; color: var(--muted); margin-top: 14px; text-align: center; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">🔧</div>
        <div>
          <h1>NTC AUTO PARTS</h1>
          <p>Sales Dashboard</p>
        </div>
      </div>

      <div id="error" class="login-error" style="display:none"></div>

      <form id="login-form" autocomplete="on">
        <div class="login-field">
          <label for="username">User ID</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus />
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary login-btn">Sign in</button>
      </form>

      <p class="login-hint">Internal use only — authorized staff</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorDiv = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorDiv.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Login failed');
        location.href = '/';
      } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
